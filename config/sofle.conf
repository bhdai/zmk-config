# Enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y

# Add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable mouse / pointer support (used by the MOUSE layer: move, scroll, clicks)
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Enable ZMK Studio (live keymap editing via zmk.studio).
# Pair with the studio-rpc-usb-uart snippet on the left build (build.yaml)
# and a &studio_unlock key in the keymap.
CONFIG_ZMK_STUDIO=y

# Report the right (peripheral) half's battery level to the left (central),
# so the left OLED can display both halves' charge.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Deep sleep when idle to save battery (wireless use).
CONFIG_ZMK_SLEEP=y

# Uncomment this line below to add rgb underglow / backlight support
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
